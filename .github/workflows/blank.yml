name: Build Ramayana SQLite

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download Builder Script
        run: |
          curl -L https://raw.githubusercontent.com/infinitydattaashim1210958-coder/ramayana-db-builder/main/build_ramayana_db.py -o build_ramayana_db.py

      - name: Build SQLite Database
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          python build_ramayana_db.py

      - name: Upload SQLite Database
        uses: actions/upload-artifact@v4
        with:
          name: ramayana-sqlite
          path: ramayana.db
