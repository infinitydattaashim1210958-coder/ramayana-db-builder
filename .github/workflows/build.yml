name: Build Ramayana SQLite Database

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install SQLite
        run: |
          sudo apt-get update
          sudo apt-get install sqlite3

      - name: Create Database
        run: |
          mkdir output
          sqlite3 output/ramayana.db < schema.sql
          sqlite3 output/ramayana.db < seed.sql

      - name: Verify Database
        run: |
          sqlite3 output/ramayana.db ".tables"
          sqlite3 output/ramayana.db "SELECT COUNT(*) FROM kandas;"

      - name: Compress Database
        run: |
          gzip -9 output/ramayana.db

      - name: Upload Database
        uses: actions/upload-artifact@v4
        with:
          name: ramayana-db
          path: output/ramayana.db.gz
